spring:
  application:
    name: sql-api-gateway
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

gateway:
  admin:
    enabled: true
  redis:
    enabled: false
    host: localhost
    port: 6379
    password: ""
  auth:
    jwt-secret: "sql-api-gateway-dev-secret-key-change-in-production-32bytes"
    jwt-expiration-hours: 24
    default-admin-username: admin
    default-admin-password: admin123
  consumer:
    bootstrap-key: ""
    key-pepper: dev-pepper-change-in-production
    legacy-enabled: false
  secrets:
    encryption-key: ${GATEWAY_SECRET_ENCRYPTION_KEY:dev-secret-key-change-in-production!!}
  health:
    check-downstream-datasources: true
    datasource-check-timeout-ms: 3000
    datasource-cache-ttl-seconds: 60
  pool:
    global-max-connections: 200
    acquire-timeout-ms: 5000
    replica-count: 1
  security:
    swagger-public: true
    actuator-public: true
    cors-allowed-origins:
      - http://localhost:5173
      - http://localhost:8080
      - http://localhost:8088
    cors-allow-credentials: true
    trust-forwarded-for: false
    login-rate-limit-per-minute: 20
    jwt-cookie-name: gw_token
    jwt-cookie-secure: false
  access-log:
    cleanup-enabled: true
    retention-days: 90
    cleanup-cron: "0 0 3 * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
