spring:
  application:
    name: sql-api-gateway
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

gateway:
  admin:
    enabled: true
  auth:
    jwt-secret: "sql-api-gateway-dev-secret-key-change-in-production-32bytes"
    jwt-expiration-hours: 24
    default-admin-username: admin
    default-admin-password: admin123
  consumer:
    bootstrap-name: 开发默认调用方
    bootstrap-key: gw_dev_change_me_in_production
