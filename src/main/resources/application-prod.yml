# 生产/联调：连接外部 PostgreSQL
spring:
  datasource:
    url: jdbc:postgresql://192.168.31.100:5432/vectordb
    username: ${GATEWAY_DB_USER:root}
    password: ${GATEWAY_DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

gateway:
  auth:
    jwt-secret: ${GATEWAY_JWT_SECRET}
    default-admin-password: ${GATEWAY_ADMIN_PASSWORD}
  consumer:
  # 生产禁用 Legacy Consumer 自动创建与全量授权；请使用主题 API Key
    bootstrap-key: ""
    key-pepper: ${GATEWAY_KEY_PEPPER}
    legacy-enabled: false
    legacy-sunset-date: "2026-12-31"
  secrets:
    encryption-key: ${GATEWAY_SECRET_ENCRYPTION_KEY}
  redis:
    enabled: true
  pool:
    replica-count: ${GATEWAY_REPLICA_COUNT:1}
  security:
    swagger-public: false
    actuator-public: false
    cors-allowed-origins:
      - ${GATEWAY_CORS_ORIGINS:http://localhost:5173}
    cors-allow-credentials: true
    trust-forwarded-for: true
    login-rate-limit-per-minute: 10
    jwt-cookie-secure: true
